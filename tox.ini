[tox]
envlist = py
skipsdist = true
skip_missing_interpreters = true

[testenv]
basepython = python3
package = skip
pass_env = HOME,LSST_*,EUPS_*,PATH,PYTHONPATH,STACK_DIR,TESTDATA_NICKEL_DIR
allowlist_externals = ./scripts/with-stack.sh
commands =
    ./scripts/with-stack.sh -S {env:STACK_DIR:/opt/lsst/software/stack} --setup-testdata -- pytest -q
