# tox.ini
[tox]
envlist = py
skipsdist = true
requires = tox>=4

[testenv]
package = skip
# Pass through these env vars from host environment
passenv =
    STACK_DIR
    TESTDATA_NICKEL_DIR
allowlist_externals = ./scripts/with-stack.sh
commands =
    # Default to local macOS path if STACK_DIR not set (CI will set it)
    ./scripts/with-stack.sh -S "{env:STACK_DIR:/Users/dangause/Developer/lick/lsst/lsst_stack}" --setup-testdata -- pytest -q
