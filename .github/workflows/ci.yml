# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/lsst/scipipe:al9-w_2025_32
      options: --user 0:0   # <— run as root to avoid uid=1001 passwd issues
    defaults:
      run:
        shell: bash        # <— ensure steps use bash

    env:
      STACK_DIR: /opt/lsst/software/stack
      TESTDATA_NICKEL_DIR: ${{ github.workspace }}/extern/testdata_nickel

    steps:
      - name: Checkout obs_nickel
        uses: actions/checkout@v4

      - name: Checkout testdata_nickel
        uses: actions/checkout@v4
        with:
          repository: dangause/testdata_nickel
          path: extern/testdata_nickel
          # token: ${{ secrets.GH_PAT }}   # if private

      - name: Create Python venv for pre-commit/tox
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          pip install pre-commit tox

      - name: Run pre-commit
        run: . .venv/bin/activate && pre-commit run -a

      - name: Run tests via tox (honors TESTDATA_NICKEL_DIR)
        run: . .venv/bin/activate && tox
