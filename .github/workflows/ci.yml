name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    container: lsstsqre/scipipe:latest   # has EUPS + LSST stack

    env:
      STACK_DIR: /opt/lsst/software/stack
      TESTDATA_NICKEL_DIR: ${{ github.workspace }}/extern/testdata_nickel

    steps:
      - name: Checkout obs_nickel
        uses: actions/checkout@v4

      - name: Checkout testdata_nickel
        uses: actions/checkout@v4
        with:
          repository: dangause/testdata_nickel
          path: extern/testdata_nickel
          # If the repo is private, uncomment the next line and set GH_PAT in repo secrets:
          # token: ${{ secrets.GH_PAT }}

      - name: Install pre-commit and tox
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pre-commit tox

      - name: Run pre-commit
        run: pre-commit run -a

      - name: Run tests via tox (honors TESTDATA_NICKEL_DIR)
        run: tox -q
