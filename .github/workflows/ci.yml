name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/lsst/scipipe:al9-w_2025_32
      # Run as the same UID/GID as the hosted runner workspace (/__w), avoids EACCES
      options: --user 1001:1001
      env:
        SHELL: /bin/bash
        HOME: /github/home
        USER: runner
    env:
      STACK_DIR: /opt/lsst/software/stack
      TESTDATA_NICKEL_DIR: ${{ github.workspace }}/extern/testdata_nickel

    steps:
      - name: Checkout obs_nickel
        uses: actions/checkout@v4

      - name: Checkout testdata_nickel
        uses: actions/checkout@v4
        with:
          repository: dangause/testdata_nickel
          path: extern/testdata_nickel
          # If private, uncomment and set GH_PAT secret:
          # token: ${{ secrets.GH_PAT }}

      - name: Mark repo as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Python venv
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install pre-commit tox

      - name: Run pre-commit
        run: . .venv/bin/activate && pre-commit run -a

      - name: Run tests via tox (honors TESTDATA_NICKEL_DIR)
        run: . .venv/bin/activate && tox -q
