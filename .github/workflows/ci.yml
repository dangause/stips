name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/lsst/scipipe:al9-w_2025_32
      # run as root so checkout can write to /__w/_temp and pre-commit has permissions
      options: --user 0

    # make sure every `run:` executes in the repo root, with bash
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}

    env:
      STACK_DIR: /opt/lsst/software/stack
      TESTDATA_NICKEL_DIR: ${{ github.workspace }}/extern/testdata_nickel

    steps:
      - name: Checkout obs_nickel
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout testdata_nickel
        uses: actions/checkout@v4
        with:
          repository: dangause/testdata_nickel
          path: extern/testdata_nickel
          # If private, uncomment and provide a token in repo secrets:
          # token: ${{ secrets.GH_PAT }}

      - name: Install git (AlmaLinux container)
        run: |
          if command -v git >/dev/null 2>&1; then
            git --version
          elif command -v microdnf >/dev/null 2>&1; then
            microdnf install -y git
          elif command -v dnf >/dev/null 2>&1; then
            dnf -y makecache && dnf -y install git
          else
            echo "No known package manager found to install git." >&2
            exit 1
          fi

      - name: Mark workspace as safe for git (running as root)
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory /__w/${{ github.event.repository.name }}/${{ github.event.repository.name }}

      - name: Create Python venv for pre-commit + tox
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          pip install pre-commit tox

      - name: Run pre-commit
        run: |
          . .venv/bin/activate
          pre-commit run -a

      - name: Run tests via tox (honors TESTDATA_NICKEL_DIR)
        run: |
          . .venv/bin/activate
          tox
