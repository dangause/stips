name: CI

on:
  push:
    branches: [ main, master, dev, audit-fixes ]
  pull_request:
    branches: [ main, master, dev ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/lsst/scipipe:al9-w_2025_32
      # run as root so checkout can write to /__w/_temp and pre-commit has permissions
      options: --user 0

    # make sure every `run:` executes in the repo root, with bash
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}

    env:
      STACK_DIR: /opt/lsst/software/stack
      # Use internal testdata from instruments/nickel/testdata
      TESTDATA_NICKEL_DIR: ${{ github.workspace }}/instruments/nickel/testdata

    steps:
      - name: Install git and git-lfs (AlmaLinux container)
        run: |
          if command -v microdnf >/dev/null 2>&1; then
            microdnf install -y git git-lfs
          elif command -v dnf >/dev/null 2>&1; then
            dnf -y makecache && dnf -y install git git-lfs
          else
            echo "No known package manager found to install git." >&2
            exit 1
          fi
          # Verify installation
          git --version
          git lfs version

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Mark workspace as safe for git (running as root)
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory /__w/${{ github.event.repository.name }}/${{ github.event.repository.name }}

      - name: Create Python venv for pre-commit + tox
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          pip install pre-commit tox

      - name: Run pre-commit
        run: |
          . .venv/bin/activate
          pre-commit run -a

      - name: Run tests via tox (honors TESTDATA_NICKEL_DIR)
        run: |
          . .venv/bin/activate
          tox
