name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/lsst/scipipe:al9-w_2025_32
      # Run as root so checkout can write to /__w/_temp/_runner_file_commands
      options: --user 0

    env:
      STACK_DIR: /opt/lsst/software/stack
      TESTDATA_NICKEL_DIR: ${{ github.workspace }}/extern/testdata_nickel

    steps:
      - name: Checkout obs_nickel
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout testdata_nickel
        uses: actions/checkout@v4
        with:
          repository: dangause/testdata_nickel
          path: extern/testdata_nickel
          # token: ${{ secrets.GH_PAT }}   # uncomment if private

      # With root user we don't need to fabricate a passwd entry.
      # Ensure git exists for pre-commit:
      - name: Install git (inside container)
        shell: bash
        run: |
          if command -v git >/dev/null; then
            git --version
          elif command -v microdnf >/dev/null; then
            microdnf install -y git
          elif command -v dnf >/dev/null; then
            dnf -y makecache && dnf -y install git
          elif command -v apt-get >/dev/null; then
            apt-get update && apt-get install -y git
          else
            echo "No known package manager; cannot install git." >&2
            exit 1
          fi

      - name: Create Python venv for pre-commit + tox
        shell: bash
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          pip install pre-commit tox

      - name: Run pre-commit
        shell: bash
        run: |
          . .venv/bin/activate
          pre-commit run -a

      - name: Run tests via tox (honors TESTDATA_NICKEL_DIR)
        shell: bash
        run: |
          . .venv/bin/activate
          tox
