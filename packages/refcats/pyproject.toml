[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "obs-nickel-refcats"
version = "0.1.0"
description = "Manifests and helpers for Nickel reference catalogs."
authors = [{ name = "Dan Gause" }]
requires-python = ">=3.12"
dependencies = ["pyyaml"]
readme = "README.md"

[project.scripts]
nickel-refcats = "nickel_refcats.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
