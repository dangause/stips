description: |
  Forced photometry on preliminary_visit_image (calibrated science exposures from calibrateImage).
  Uses initial_stars_detector catalog from the same visit as reference positions.
instrument: lsst.obs.nickel.Nickel
tasks:
  forcedPhotCcd:
    class: lsst.meas.base.forcedPhotCcd.ForcedPhotCcdTask
    config:
      # Use preliminary_visit_image instead of calexp
      connections.exposure: preliminary_visit_image
      # Use initial_stars_detector from CalibrateImageTask
      # This is the star catalog produced during calibration
      connections.refCat: "initial_stars_detector"
