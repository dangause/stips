# Forced photometry (diffim) lightcurve extraction and plotting for Nickel.

description: |
  Build a visit table and generate forced photometry lightcurve tables/plots for a target.
  Configure the target name at runtime via config overrides.

  The per-band task (plotForcedPhotDiffimLightcurveBand) produces one table and plot per band.
  The combined task (plotForcedPhotDiffimLightcurveCombined) reads those per-band tables
  and produces a single multi-band plot.

tasks:
  makeFphotVisitTable:
    class: lsst.pipe.tasks.postprocess.MakeVisitTableTask
    config:
      connections.visitSummaries: preliminary_visit_summary
      connections.outputCatalog: preliminary_visit_table

  # Per-band forced photometry diffim lightcurve
  plotForcedPhotDiffimLightcurveBand:
    class: lsst.obs.nickel.tasks.ForcedPhotDiffimLightcurveBandTask
    config:
      connections.inputName: forced_phot_diffim_radec
      connections.visitTableName: preliminary_visit_table
      connections.outputName: forced_phot_diffim_lightcurve_band

  # Combined multi-band forced photometry diffim lightcurve
  plotForcedPhotDiffimLightcurveCombined:
    class: lsst.obs.nickel.tasks.ForcedPhotDiffimLightcurveCombinedTask
    config:
      connections.inputName: forced_phot_diffim_lightcurve_band
      connections.outputName: forced_phot_diffim_lightcurve_combined
