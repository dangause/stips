[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "obs-stips"
version = "0.1.0"
description = "LSST obs glue package for STIPS-profile instruments"
authors = [{ name = "Dan Gause" }]
requires-python = ">=3.12"
dependencies = [
    "stips",
    "astro_metadata_translator>=0.11.0",
    "astropy",
    "numpy",
    "pyyaml",
]

[project.optional-dependencies]
# matplotlib is only needed by the plotting module and the plot PipelineTasks,
# which already require the (non-pip) LSST stack; keep it an opt-in extra.
plotting = ["matplotlib"]

[project.entry-points."astro_metadata_translator.translators"]
Stips = "lsst.obs.stips.translator:StipsTranslator"

[tool.uv.sources]
stips = { workspace = true }

[tool.setuptools.packages.find]
where = ["python"]
