[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "obs-nickel-data-tools"
version = "0.1.0"
description = "Data access, exploration, and pipeline tools for obs_nickel: archive queries, Butler inspection, template ingest, and skymap helpers."
authors = [{ name = "Dan Gause" }]
requires-python = ">=3.12"
dependencies = [
    "astropy",
    "numpy",
    "pandas",
    "pyyaml>=6.0",
    "rich>=13.0.0",
    "matplotlib>=3.5.0",
    "click>=8.0.0",
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "jinja2>=3.1.0",
    "sse-starlette>=1.8.0",
]
readme = "README.md"

[project.scripts]
# Main CLI
nickel = "obs_nickel_data_tools.cli:main"

# Archive tools
obsn-archive-fetch-night = "obs_nickel_data_tools.pipeline_tools.fetch_archive_night:main"
obsn-archive-nights = "obs_nickel_data_tools.pipeline_tools.generate_nights_list:main"
obsn-archive-ingest-ps1 = "obs_nickel_data_tools.pipeline_tools.ingest_ps1_template:main"
obsn-archive-template-meta = "obs_nickel_data_tools.pipeline_tools.template_metadata:main"

# DIA tools
obsn-dia-assess = "obs_nickel_data_tools.pipeline_tools.assess_dia_quality:main"
obsn-dia-lightcurve = "obs_nickel_data_tools.pipeline_tools.extract_lightcurve:main"

# Skymap tools
obsn-skymap-build-config = "obs_nickel_data_tools.skymap.build_discrete_skymap_config:main"
obsn-skymap-make = "obs_nickel_data_tools.skymap.make_skymap_from_datasets:main"

# EDA tools
obsn-eda-archive = "obs_nickel_data_tools.eda.archive_query:main"
obsn-eda-butler = "obs_nickel_data_tools.eda.butler_inspect:main"

[project.entry-points."obs_nickel_data_tools.instruments"]
nickel = "obs_nickel_data_tools.instruments.nickel:NickelPlugin"

[tool.setuptools.packages.find]
where = ["src"]
