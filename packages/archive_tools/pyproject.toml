[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "obs-nickel-archive-tools"
version = "0.1.0"
description = "Archive/download, template ingest, and skymap helpers for obs_nickel pipelines."
authors = [{ name = "Dan Gause" }]
requires-python = ">=3.12"
dependencies = [
    "astropy",
    "numpy",
    "pandas",
]
readme = "README.md"

[project.scripts]
obsn-archive-fetch-night = "obs_nickel_archive_tools.pipeline_tools.fetch_archive_night:main"
obsn-archive-nights = "obs_nickel_archive_tools.pipeline_tools.generate_nights_list:main"
obsn-archive-ingest-ps1 = "obs_nickel_archive_tools.pipeline_tools.ingest_ps1_template:main"
obsn-archive-template-meta = "obs_nickel_archive_tools.pipeline_tools.template_metadata:main"
obsn-dia-assess = "obs_nickel_archive_tools.pipeline_tools.assess_dia_quality:main"
obsn-dia-lightcurve = "obs_nickel_archive_tools.pipeline_tools.extract_lightcurve:main"
obsn-skymap-build-config = "obs_nickel_archive_tools.skymap.build_discrete_skymap_config:main"
obsn-skymap-make = "obs_nickel_archive_tools.skymap.make_skymap_from_datasets:main"

[tool.setuptools.packages.find]
where = ["src"]
