[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "obs-nickel-defects"
version = "0.1.0"
description = "Defect generation tooling and packaged Nickel defect outputs."
authors = [{ name = "Dan Gause" }]
requires-python = ">=3.12"
dependencies = [
    "numpy",
    "pandas",
    "matplotlib",
    "scipy",
]
readme = "README.md"

[project.scripts]
obsn-defects-from-flats = "defects_tools.defects.make_defects_from_flats:main"

[tool.setuptools.packages.find]
where = ["defects_tools"]
