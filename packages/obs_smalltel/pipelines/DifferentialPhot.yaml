# Differential aperture photometry pipeline for bright star time-domain science.
#
# Reads pre-computed aperture fluxes from calibrateImage star catalogs,
# selects a comparison star ensemble, and produces normalized differential
# flux lightcurves. Works for exoplanet transits and variable star monitoring.

description: |
  Differential aperture photometry pipeline. Requires calibrateImage outputs
  (single_visit_star_unstandardized catalogs). Configure target coordinates
  and aperture radius at runtime via config overrides.

tasks:
  makeVisitTable:
    class: lsst.pipe.tasks.postprocess.MakeVisitTableTask
    config:
      connections.visitSummaries: preliminary_visit_summary
      connections.outputCatalog: preliminary_visit_table

  differentialPhot:
    class: lsst.obs.smalltel.tasks.DifferentialPhotTask
    config:
      connections.starCatalogName: single_visit_star_unstandardized
      connections.visitTableName: preliminary_visit_table
      connections.outputName: differential_phot_lightcurve
      apertureRadius: 17.0
      nComparisons: 10

subsets:
  lightcurve:
    subset:
      - makeVisitTable
      - differentialPhot
    description: |
      Generate differential photometry lightcurve from existing
      calibrateImage star catalogs.
