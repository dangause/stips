[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    # Code quality tools
    "ruff",
    "pyright",
    "pre-commit>=4.3.0",
    # Testing
    "tox>=4",
    "pytest>=7",
]
notebooks = [
    # Jupyter/notebook support for analysis
    "jupyterlab>=4.4.7",
    "notebook>=7.4.5",
]
analysis = [
    # Data analysis libraries
    "pandas>=2.3.2",
    "pyarrow>=21.0.0",
    "fastparquet>=2024.11.0",
    "pyvo>=1.7",
    "astropy",
    "astroquery",
    "boto3",
    "s3fs",
]
rsp = [
    # Rubin Science Platform integration
    "lsst-rsp>=0.10.0",
]

[tool.ruff]
line-length = 110
target-version = "py312"
src = [
    "instruments/nickel",
    "packages/refcats",
    "instruments/nickel/testdata",
    "instruments/nickel/tuning",
    "instruments/nickel/colorterms",
    "packages/stips",
    "packages/obs_stips",
    "scripts",
]
extend-exclude = [
    # Vendored Lick archive: exclude the SERVER subtree; keep the client
    # (lick_archive/client/) lint-visible — the only part STIPS uses (F-035).
    "instruments/nickel/vendor/lick_searchable_archive/deploy/**",
    "instruments/nickel/vendor/lick_searchable_archive/doc/**",
    "instruments/nickel/vendor/lick_searchable_archive/frontend/**",
    "instruments/nickel/vendor/lick_searchable_archive/scripts/**",
    "instruments/nickel/vendor/lick_searchable_archive/test/**",
    "instruments/nickel/vendor/lick_searchable_archive/lick_archive/apps/**",
    "instruments/nickel/vendor/lick_searchable_archive/lick_archive/authorization/**",
    "instruments/nickel/vendor/lick_searchable_archive/lick_archive/config/**",
    "instruments/nickel/vendor/lick_searchable_archive/lick_archive/db/**",
    "instruments/nickel/vendor/lick_searchable_archive/lick_archive/external/**",
    "instruments/nickel/vendor/lick_searchable_archive/lick_archive/job_queue/**",
    "instruments/nickel/vendor/lick_searchable_archive/lick_archive/lick_archive_site/**",
    "instruments/nickel/vendor/lick_searchable_archive/lick_archive/metadata/**",
    "instruments/nickel/vendor/lick_searchable_archive/lick_archive/utils/**",
    # other vendor mirrors
    "packages/refcats/upstream/**",
    "instruments/nickel/testdata/upstream/**",
]
force-exclude = true

[tool.ruff.lint]
ignore = ["N802", "N803", "N806", "N812", "N813", "N815", "N816", "N999"]
select = [
    "E", # pycodestyle
    "F", # pyflakes
    "N", # pep8-naming
    "W", # pycodestyle
]
extend-select = [
    "RUF100", # Warn about unused noqa
]

[tool.ruff.lint.pycodestyle]
max-doc-length = 79

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.pytest.ini_options]
# stips tests live in packages/stips/tests; per-instrument tests in
# instruments/<name>/tests. Add additional packages here as they add
# tests/ directories.
testpaths = [
    "instruments/nickel/tests",
    "instruments/ctio1m/tests",
    "packages/stips/tests",
    "packages/obs_stips/tests",
    "packages/refcats/tests",
    # "instruments/nickel/defects/tests",
    # "instruments/nickel/colorterms/tests",
    # "instruments/nickel/tuning/tests",
]
# Exclude vendor packages and upstream directories from test discovery
norecursedirs = [
    ".git",
    ".venv",
    "build",
    "dist",
    "*.egg-info",
    "instruments/nickel/vendor/lick_searchable_archive",
    "packages/refcats/upstream",
    "instruments/nickel/testdata/upstream",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests (deselect with '-m \"not integration\"')",
]

[tool.pyright]
pythonVersion = "3.12"
venvPath = "."
venv = ".venv"
include = [
    "instruments/nickel",
    "instruments/ctio1m",
    "packages/stips",
    "packages/obs_stips",
    "instruments/nickel/defects",
    "packages/refcats",
    "instruments/nickel/testdata",
    "instruments/nickel/tuning",
    "instruments/nickel/colorterms",
    "scripts",
]
exclude = [
    ".venv",
    ".uv-cache",
    "logs",
    "**/build",
    "**/dist",
    "instruments/nickel/vendor/lick_searchable_archive",
    "packages/refcats/upstream",
    "instruments/nickel/testdata/upstream",
]
ignore = [
    # LSST pipeline configs are executed with an injected `config` object.
    "packages/obs_stips/instrument_defaults/configs",
    # convertReferenceCatalog configs, likewise executed with an injected
    # `config` object (shipped as stips_refcats package data).
    "packages/refcats/src/stips_refcats/configs",
]
# Keep noise down when LSST/Rubin dependencies are not in the active venv.
reportMissingImports = "warning"
reportMissingModuleSource = "warning"
reportOptionalMemberAccess = "warning"
reportOptionalOperand = "warning"
reportOptionalCall = "warning"
reportAttributeAccessIssue = "warning"
reportGeneralTypeIssues = "warning"
reportArgumentType = "warning"
reportReturnType = "warning"
reportOperatorIssue = "warning"
reportUnsupportedDunderAll = "warning"
reportCallIssue = "warning"
typeCheckingMode = "basic"
