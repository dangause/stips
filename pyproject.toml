[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = ["ruff", "pyright"]

[tool.ruff]
line-length = 110
target-version = "py312"
src = [
    "packages/obs_nickel",
    "packages/archive_tools",
    "packages/defects",
    "packages/refcats",
    "packages/testdata",
    "scripts",
]
extend-exclude = [
    # vendor mirrors
    "packages/lick_searchable_archive/**",
    "packages/refcats/upstream/**",
    "packages/testdata/upstream/**",
]
force-exclude = true

[tool.ruff.lint]
ignore = ["N802", "N803", "N806", "N812", "N813", "N815", "N816", "N999"]
select = [
    "E", # pycodestyle
    "F", # pyflakes
    "N", # pep8-naming
    "W", # pycodestyle
]
extend-select = [
    "RUF100", # Warn about unused noqa
]

[tool.ruff.lint.pycodestyle]
max-doc-length = 79

[tool.ruff.lint.pydocstyle]
convention = "numpy"
