# Small Telescope Image Processing Suite - Base BPS Configuration
#
# This file contains shared settings for all BPS pipelines.
# Pipeline-specific configs inherit from this via includeConfigs.
#
# Variables (substituted at submit time):
#   {repo}              - Butler repository path
#   {night}             - Observing night (YYYYMMDD)
#   {timestamp}         - Run timestamp
#   {instrument_dir}    - Path to the declarative instrument package
#   {stips_defaults}    - Path to framework reference pipelines/configs
#   {obs_stips_dir}     - Path to obs_stips (LSST glue) package
#   {stips_src}         - Path to stips src-layout (src/)
#   {obs_data_package}  - Instrument data package product name (may be empty)
#   {instrument_data_dir} - Path to the instrument data package (may be empty)
#   {cp_pipe_dir}       - Path to cp_pipe package
#   {operator}          - Username for output collection
#   {project}           - Project name for accounting

# =============================================================================
# Payload Defaults
# =============================================================================
# These are overridden by pipeline-specific configs
payload:
  payloadName: nickel-{pipeline}-{night}
  butlerConfig: "{repo}"
  runInit: true

# =============================================================================
# Resource Defaults
# =============================================================================
# Conservative defaults suitable for most tasks
# Pipeline configs can override for specific tasks

requestMemory: 4096          # 4 GB default
requestCpus: 1               # Single CPU per quantum
requestDisk: 10240000        # 10 GB scratch space

# Retry configuration with memory scaling
# On OOM failure, retry with memoryMultiplier * requestMemory
memoryMultiplier: 2.0        # Double memory on retry
numberOfRetries: 3           # Up to 3 retries
requestMemoryMax: 32768      # 32 GB maximum (cap scaling)

# =============================================================================
# Execution Defaults
# =============================================================================

# Quantum clustering - single quantum per job is most robust
# This prevents one bad quantum from failing a whole cluster
clusterAlgorithm: lsst.ctrl.bps.quantum_clustering_funcs.single_quantum_clustering

# Command execution options
executionButlerQueryStep: false   # Use local butler for queries

# =============================================================================
# Logging Configuration
# =============================================================================

# Logging options for all pipetask commands
defaultPreCmdOpts: "--long-log --log-level INFO"
qgraphPreCmdOpts: "--long-log --log-level INFO"
runPreCmdOpts: "--long-log --log-level INFO --log-tty"

# =============================================================================
# Environment Setup
# =============================================================================
# This gets prepended to all job commands
# Override in site-specific configs with actual paths

preScript: |
  # Source LSST stack
  source {stack_dir}/loadLSST.bash
  setup lsst_distrib

  # STIPS framework: obs_stips (LSST glue) + stips (core, src-layout).
  # The instrument is declarative (loaded by path from INSTRUMENT_DIR) — no
  # per-instrument EUPS product to set up.
  export INSTRUMENT_DIR="{instrument_dir}"
  export STIPS_DEFAULTS="{stips_defaults}"
  if [[ -d "{obs_stips_dir}" ]]; then
      setup -r {obs_stips_dir} obs_stips 2>/dev/null || true
  fi
  if [[ -d "{stips_src}" ]]; then
      export PYTHONPATH="{stips_src}:${PYTHONPATH:-}"
  fi

  # Instrument data package (defects/crosstalk), if the profile declares one
  if [[ -n "{obs_data_package}" && -d "{instrument_data_dir}" ]]; then
      setup -r "{instrument_data_dir}" {obs_data_package} 2>/dev/null || true
  fi

# =============================================================================
# Output Configuration
# =============================================================================

# Default output collection naming
# Override in pipeline configs for specific naming
output:
  # Collections follow Nickel naming convention
  run: "Nickel/runs/{night}/{pipeline}/{timestamp}/run"

# =============================================================================
# Submit Directory Configuration
# =============================================================================

# Where to create submit directories
submitPath: "{repo}/bps/submit/{pipeline}_{night}_{timestamp}"

# Keep logs for debugging
saveClusteredQgraph: true
saveDot: false
saveExecutionButler: true
