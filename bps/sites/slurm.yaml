# Nickel Processing Suite - Slurm Site Configuration
#
# BPS configuration for Slurm-based HPC clusters using Parsl.
#
# Usage:
#   nickel bps submit calibs 20230519 --site slurm
#
# Customize for your cluster:
#   - partition: Your Slurm partition name
#   - account: Your allocation account
#   - walltime: Max job duration
#   - nodes/cores: Worker resources

includeConfigs:
  - ../base.yaml

# =============================================================================
# WMS Backend Selection
# =============================================================================
# Use Parsl with Slurm provider
wmsServiceClass: lsst.ctrl.bps.parsl.ParslService
computeSite: slurm

# =============================================================================
# Parsl Configuration
# =============================================================================
parsl:
  # Logging level for Parsl internals
  log_level: INFO

  # Retry behavior
  retries: 3

  # Monitoring (optional - uncomment if needed)
  # monitoring:
  #   enabled: true
  #   hub_address: localhost
  #   hub_port: 55055

# =============================================================================
# Slurm Site Definition
# =============================================================================
site:
  slurm:
    class: lsst.ctrl.bps.parsl.sites.Slurm

    # Cluster resources per block (adjust for your cluster)
    nodes: 1
    cores_per_node: 32
    mem_per_node: 128            # GB

    # Job time limit
    walltime: "04:00:00"         # 4 hours

    # Slurm scheduler options (customize for your cluster)
    # These are passed directly to sbatch
    scheduler_options: |
      #SBATCH --partition=normal
      #SBATCH --account={project}
      #SBATCH --export=ALL
      #SBATCH --mail-type=FAIL
      #SBATCH --mail-user={operator}@example.edu

    # Parallelism configuration
    # max_blocks limits how many Slurm jobs can run simultaneously
    max_blocks: 10
    min_blocks: 0
    init_blocks: 1
    parallelism: 1.0             # Scale up to max_blocks

    # Worker options
    worker_init: |
      # Load modules if needed
      # module load python/3.11

      # Source LSST stack
      source {stack_dir}/loadLSST.bash
      setup lsst_distrib

      # STIPS framework: obs_stips (LSST glue) + stips (core, src-layout).
      # The instrument is declarative (loaded by path from INSTRUMENT_DIR).
      export INSTRUMENT_DIR="{instrument_dir}"
      if [[ -d "{obs_stips_dir}" ]]; then
          setup -r {obs_stips_dir} obs_stips 2>/dev/null || true
      fi
      if [[ -d "{stips_src}" ]]; then
          export PYTHONPATH="{stips_src}:${PYTHONPATH:-}"
      fi
      if [[ -n "{obs_data_package}" && -d "{instrument_data_dir}" ]]; then
          setup -r "{instrument_data_dir}" {obs_data_package} 2>/dev/null || true
      fi

      # Export required environment variables
      export REPO={repo}

# =============================================================================
# Task-Specific Resource Overrides
# =============================================================================
# Adjust memory/CPU for specific pipeline tasks based on profiling

pipetask:
  # Calibration tasks
  cpBiasIsr:
    requestMemory: 2048
    requestCpus: 1

  cpBias:
    requestMemory: 4096
    requestCpus: 1

  cpFlatIsr:
    requestMemory: 4096
    requestCpus: 1

  cpFlat:
    requestMemory: 8192
    requestCpus: 2

  # Science processing tasks
  isr:
    requestMemory: 4096
    requestCpus: 1

  calibrateImage:
    requestMemory: 8192
    requestCpus: 2
    memoryMultiplier: 2.0
    numberOfRetries: 3

  # DIA tasks (memory intensive)
  rewarpTemplate:
    requestMemory: 8192
    requestCpus: 1

  subtractImages:
    requestMemory: 16384
    requestCpus: 2
    memoryMultiplier: 1.5
    numberOfRetries: 4

  detectAndMeasureDiaSource:
    requestMemory: 8192
    requestCpus: 1

  # Forced photometry
  forcedPhotDiffimRaDec:
    requestMemory: 4096
    requestCpus: 1
