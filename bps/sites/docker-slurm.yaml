# Nickel Processing Suite - Docker Slurm Site Configuration
#
# BPS configuration for the Docker Compose Slurm test environment.
# Conservative resources for containerized single-node cluster.
#
# Usage:
#   nickel run config.yaml --site docker-slurm
#   nickel bps submit calibs 20230519 --site docker-slurm

includeConfigs:
  - ../base.yaml

# =============================================================================
# WMS Backend Selection
# =============================================================================
wmsServiceClass: lsst.ctrl.bps.parsl.ParslService
computeSite: docker-slurm

# =============================================================================
# Parsl Configuration
# =============================================================================
parsl:
  log_level: DEBUG
  retries: 2

# =============================================================================
# Docker Slurm Site Definition
# =============================================================================
site:
  docker-slurm:
    class: lsst.ctrl.bps.parsl.sites.Slurm

    # Conservative: single node, 4 cores (Docker container limits)
    nodes: 1
    cores_per_node: 4
    mem_per_node: 4              # GB

    # Short walltime for testing
    walltime: "00:30:00"         # 30 minutes

    # Slurm scheduler options for Docker cluster
    scheduler_options: |
      #SBATCH --partition=normal
      #SBATCH --export=ALL

    # Parsl run_dir on shared volume (accessible from NPS + compute nodes)
    run_dir: /data/repo/parsl_runinfo

    # Command prefix: sourced before each pipetask command on compute nodes.
    # Note: ctrl_bps_parsl's Slurm class does NOT pass worker_init through
    # to Parsl's SlurmProvider, so we use commandPrefix instead.
    commandPrefix: |
      source /opt/lsst/software/stack/loadLSST.bash
      setup lsst_distrib
      # STIPS framework: obs_stips (LSST glue) + stips (core, src-layout).
      # The instrument is declarative (loaded by path from INSTRUMENT_DIR).
      setup -r /opt/nps/packages/obs_stips obs_stips 2>/dev/null || true
      export PYTHONPATH=/opt/nps/packages/stips/src:${PYTHONPATH:-}
      if [[ -d /opt/nps/packages/obs_nickel_data ]]; then
          setup -r /opt/nps/packages/obs_nickel_data obs_nickel_data 2>/dev/null || true
      fi
      export REPO=/data/repo
      export INSTRUMENT_DIR=/opt/nps/instruments/nickel
      export RAW_PARENT_DIR=/data/raw
      export REFCAT_REPO=/data/refcats

# =============================================================================
# Reduced Resources for Docker Testing
# =============================================================================
requestMemory: 2048              # 2 GB
requestCpus: 1
numberOfRetries: 1               # Fail fast
memoryMultiplier: 1.5

pipetask:
  calibrateImage:
    requestMemory: 4096
    requestCpus: 1

  subtractImages:
    requestMemory: 4096
    requestCpus: 1
