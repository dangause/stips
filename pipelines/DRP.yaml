# pipelines/DRP.yaml
description: Nickel single-visit DRP (ISR + CalibrateImage)
instrument: lsst.obs.nickel.Nickel

tasks:
  isr:
    class: lsst.ip.isr.IsrTask
    config:
      doOverscan: true
      doBias: true
      doFlat: true
      doDark: false
      doDefect: true
      doFringe: false
      doSuspect: true
      doWrite: true
      doVignette: true
      # Rough fluxMag0T1 seeds (per your file)
      fluxMag0T1:
        B: 2.0e8
        V: 2.0e8
        R: 2.0e8
        I: 2.0e8

  calibrateImage:
    class: lsst.pipe.tasks.calibrateImage.CalibrateImageTask
    config:
      # --- bootstrap PSF for first-pass detection ---
      install_simple_psf.fwhm: 7.0
      install_simple_psf.width: 35

      # ---- Source Detection ----
      psf_detection.thresholdType: "stdev"
      psf_detection.thresholdValue: 6.5
      psf_detection.minPixels: 7
      psf_detection.includeThresholdMultiplier: 1.0
      psf_detection.reEstimateBackground: true
      psf_detection.doTempLocalBackground: true
      psf_detection.doTempWideBackground: false
      psf_detection.excludeMaskPlanes: ["EDGE", "SAT", "CR", "BAD", "NO_DATA", "SUSPECT"]
      psf_detection.statsMask: ["BAD", "SAT", "EDGE", "NO_DATA", "SUSPECT"]
      psf_detection.isotropicGrow: true
      psf_detection.nSigmaToGrow: 2.0
      psf_detection.combinedGrow: true

      # ---- Astrometry ----
      # Use gaia_dr3 registered in bootstrap
      connections.astrometry_ref_cat: gaia_dr3
      astrometry.forceKnownWcs: false
      astrometry.matcher.maxOffsetPix: 300
      astrometry.matcher.maxRotationDeg: 5.0
      astrometry.matcher.matcherIterations: 12
      astrometry.maxMeanDistanceArcsec: 60.0
      astrometry.matchDistanceSigma: 8.0
      astrometry.maxIter: 12

      # ---- Photometry ----
      connections.photometry_ref_cat: panstarrs1_dr2
      photometry_ref_loader.filterMap:
        b: gMeanPSFMag
        v: gMeanPSFMag
        r: rMeanPSFMag
        i: iMeanPSFMag
        u: gMeanPSFMag
      photometry.match.matchRadius: 1.5
      photometry.applyColorTerms: false

# Pull your tuned Python config on top of the YAML values above.
# (Keeps the long/structured bits maintainable)
configs:
  calibrateImage: configs/calibrateImage/tuned_configs/best_calib_t071.py

subsets:
  processCcd:
    - isr
    - calibrateImage

steps:
  - label: processCcd
    dimensions: [instrument, exposure, detector]
