# Manifest schema for template/coadd inputs (e.g., PS1 test templates).
# Fill in URLs/checksums before use; keep only small samples in-repo.
spec: 1
default_cache: ${OBS_NICKEL_DATA:-$HOME/.cache/obs_nickel}
bundles:
  ps1_test_templates:
    version: PLACEHOLDER
    description: Small PS1 templates for validation and CI
    files:
      - url: REPLACE_ME
        sha256: REPLACE_ME
        size_bytes: 0
        dest: templates/ps1_test_templates.tar.gz
    ingest:
      collection: templates/ps1_test_PLACEHOLDER
      note: "Used for ingest_ps1_template.py smoke tests"

  deep_templates:
    version: PLACEHOLDER
    description: Full-depth coadd templates for production DIA
    files:
      - url: REPLACE_ME
        sha256: REPLACE_ME
        size_bytes: 0
        dest: templates/deep_templates.tar.gz
    ingest:
      collection: templates/deep_PLACEHOLDER
