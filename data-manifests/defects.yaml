# Manifest schema for Nickel defect masks produced from flats.
# Replace URLs/checksums before use; defects in this repo remain under
# packages/defects/defects_tools/defects for convenience.
spec: 1
default_cache: ${OBS_NICKEL_DATA:-$HOME/.cache/obs_nickel}
bundles:
  defects_2025:
    version: PLACEHOLDER
    description: CSV + PNG overlays for Nickel defects derived from cpFlats.
    files:
      - url: REPLACE_ME
        sha256: REPLACE_ME
        size_bytes: 0
        dest: defects/nickel_defects_2025.tar.gz
    ingest:
      dataset_type: defects
      collection: Nickel/calib/defects_PLACEHOLDER
