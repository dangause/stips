# Manifest schema for reference catalog bundles (Gaia, PS1, MONSTER).
# Fill in real URLs/checksums before use; this file is versioned with releases.
spec: 1
default_cache: ${OBS_NICKEL_DATA:-$HOME/.cache/obs_nickel}
bundles:
  gaia_dr3:
    version: PLACEHOLDER
    description: Gaia DR3 htm7 shards (SimpleCatalog)
    files:
      - url: REPLACE_ME
        sha256: REPLACE_ME
        size_bytes: 0
        dest: refcats/gaia_dr3/gaia_dr3_htm7.tar.gz
    ingest:
      dataset_type: gaia_dr3
      collection: refcats/gaia_dr3_PLACEHOLDER

  ps1_dr2:
    version: PLACEHOLDER
    description: PS1 DR2 htm7 shards (SimpleCatalog)
    files:
      - url: REPLACE_ME
        sha256: REPLACE_ME
        size_bytes: 0
        dest: refcats/ps1_dr2/ps1_dr2_htm7.tar.gz
    ingest:
      dataset_type: panstarrs1_dr2
      collection: refcats/ps1_dr2_PLACEHOLDER

  monster_afw:
    version: PLACEHOLDER
    description: MONSTER AFW shards with ECSV map
    files:
      - url: REPLACE_ME
        sha256: REPLACE_ME
        size_bytes: 0
        dest: refcats/monster/monster_afw.tar.gz
    ingest:
      dataset_type: the_monster_YYYYMMDD_local
      collection: refcats/monster_PLACEHOLDER
