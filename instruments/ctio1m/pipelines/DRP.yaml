description: |
  CTIO 1.0m / Y4KCam DRP overlay.

  Imports the framework reference DRP pipeline unchanged and overrides only the
  ISR steps that depend on curated calibrations CTIO does not ship. This file is
  picked up automatically by the instrument-dir-first resolver in
  ``Config.resolve_pipeline`` (``instruments/ctio1m/pipelines/DRP.yaml`` shadows
  ``$STIPS_DEFAULTS/pipelines/DRP.yaml``).

imports:
  - location: $STIPS_DEFAULTS/pipelines/DRP.yaml

tasks:
  # CTIO has no curated defect maps (obs_nickel_data is Nickel-specific), so the
  # ISR ``defects`` connection has no datasets to consume. Disable defect masking
  # while keeping overscan/bias/flat — the only ISR steps CTIO has calibs for.
  isr:
    class: lsst.ip.isr.IsrTask
    config:
      doDefect: false
