[project]
name = "lick-searchable-archive"
version = "0.1.0"
description = "Lick Observatory Searchable Archive - Client and tools for accessing archived observatory data"
readme = "README.rst"
requires-python = ">=3.8"
license = {file = "LICENSE"}
authors = [
    {name = "Lick Observatory"}
]
keywords = ["astronomy", "observatory", "data-archive", "lick"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: BSD License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Astronomy",
]

dependencies = [
    "requests>=2.25.0",
    "tenacity>=8.0.0",
]

[project.optional-dependencies]
# Optional dependencies for coordinate queries
coords = [
    "astropy>=5.0",
]

# Full dependencies including Django web application
web = [
    "django>=4.2,<5.0",
    "djangorestframework>=3.14.0",
    "celery>=5.2.0",
    "sqlalchemy>=2.0.0",
    "psycopg2-binary>=2.9.0",
]

# Development dependencies
dev = [
    "pytest>=7.0.0",
    "pytest-django>=4.5.0",
]

[project.urls]
Homepage = "https://archive.ucolick.org"
Repository = "https://github.com/lick-observatory/lick-searchable-archive"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["lick_archive"]

[dependency-groups]
dev = [
    "pytest>=7.0.0",
    "pytest-django>=4.5.0",
]
