# Example pipeline configuration for an exoplanet transit campaign
#
# Usage:
#   nickel run scripts/config/example_exoplanet/pipeline_transit_template.yaml
#   nickel run scripts/config/example_exoplanet/pipeline_transit_template.yaml --dry-run
#
# This is a TEMPLATE - copy and customize for your target:
#   1. Replace object/ra/dec with your exoplanet host coordinates
#   2. Set template nights (any epochs — star is at baseline >95% of the time)
#   3. Set science nights for your observing campaign
#   4. Adjust period_min/period_max and transit_duration_min/max
#   5. Update env paths to match your system
#
# Pipeline steps:
#   0. Bootstrap repository (automatic if needed)
#   1. Build coadd templates from many epochs (median -> baseline reference)
#   2. Run calibrations per night
#   3. Run science processing per night
#   4. Run DIA per night per band
#   5. Run forced photometry at host star coordinates (visit images)
#   6. Extract combined multi-band lightcurve
#   7. Run BLS transit search and phase-folded transit plot

# =============================================================================
# Environment Configuration (update paths for your system)
# =============================================================================
env:
  REPO: "/path/to/butler/repo"
  STACK_DIR: "/path/to/lsst_stack"
  INSTRUMENT_DIR: "/path/to/nickel_processing_suite/instruments/nickel"
  RAW_PARENT_DIR: "/path/to/raw/data"
  REFCAT_REPO: "/path/to/refcats"

# Target information
# Replace with your exoplanet host star coordinates
object: "HAT-P-32"
ra: 30.456
dec: 46.789

# Bands to process (Nickel supports b, v, r, i)
bands: ["r", "i"]

# Template configuration - use Nickel coadds from many epochs
# Star is at baseline brightness >95% of the time, so any epochs work.
# Median stacking naturally rejects the few in-transit frames.
template:
  type: coadd
  nights:
    - 20230601
    - 20230615
    - 20230620
    - 20230701
    - 20230715
    - 20230801

# Science nights - your observing campaign
science:
  nights:
    - 20230701
    - 20230705
    - 20230710
    - 20230715
    - 20230720

# Pipeline configuration files (paths relative to obs_nickel/configs/)
configs:
  science:
    calibrate_image: calibrateImage/tuned_configs/dense_strict.py
    calibrate_image_fallbacks:
      - calibrateImage/tuned_configs/dense_relaxed.py
      - calibrateImage/tuned_configs/sparse_relaxed.py
    colorterms: apply_colorterms.py
  coadd:
    make_direct_warp: coadds/makeDirectWarp_relaxed.py
  dia:
    subtract_images: dia/subtractImages.py
    detect_and_measure: dia/detectAndMeasure.py

# Processing options
options:
  jobs: 6
  skip_calibs: false
  skip_science: false
  rebuild_templates: false
  skip_dia: false
  continue_on_error: true
  use_fallbacks: true

  # Exoplanet transit options
  pipeline_type: transit
  forced_phot: true
  # pipeline_type: transit auto-sets forced_phot_image_type: visit
  # pipeline_type: transit auto-sets transit_search: true, search_method: bls

  # Transit search parameters
  period_min: 1.0                 # Minimum orbital period (days)
  period_max: 10.0                # Maximum orbital period (days)
  transit_duration_min: 1.0       # Minimum transit duration (hours)
  transit_duration_max: 4.0       # Maximum transit duration (hours)
  period_samples: 10000           # BLS period grid resolution

# Lightcurve configuration
lightcurve:
  enabled: true
  dataset_type: forced_phot_radec   # Total flux for transit depth
  min_snr: 0                              # Keep all points for BLS
  y_axis: flux_nJy
  x_axis: mjd
