# Example pipeline configuration for nickel run command
#
# Usage:
#   nickel run scripts/config/example_pipeline.yaml
#   nickel run scripts/config/example_pipeline.yaml --dry-run
#
# This file orchestrates the full pipeline:
#   1. Ingest PS1 templates (r/i bands only)
#   2. Run calibrations per night
#   3. Run science processing per night
#   4. Run DIA per night per band
#   5. Run forced photometry per night
#   6. Extract combined lightcurve

# =============================================================================
# Environment Configuration (choose ONE approach)
# =============================================================================
#
# Option 1: Use a profile (loads .env.{profile} file)
profile: "2023ixf"
#
# Option 2: Inline environment variables (self-contained, no .env file needed)
# Uncomment and fill in paths for your system:
# env:
#   REPO: "${HOME}/Data/lick/nickel/repo"
#   STACK_DIR: "${HOME}/lsst_stack"
#   OBS_NICKEL: "${HOME}/Developer/obs_nickel"
#   RAW_PARENT_DIR: "${HOME}/Data/lick/nickel/raw"
#   # Optional:
#   # REFCAT_REPO: "${HOME}/Data/refcats"
#   # CP_PIPE_DIR: ""  # Auto-discovered from stack

# Target information
# NOTE: object uses flexible matching (case-insensitive, partial match)
# "2023ixf" will match "SN2023ixf" in FITS headers
object: "2023ixf"
ra: 210.910833
dec: 54.316389

# Bands to process (PS1 templates only support r/i)
bands: ["r", "i"]

# Template configuration
template:
  type: ps1             # "ps1" or "coadd"
  degrade_seeing: 2.0   # Optional: convolve PS1 to this FWHM (arcsec)
  # nights: []          # For coadd templates: list of nights to stack

# Observing nights and their visit IDs per band
# Format: night -> band -> [visit_ids]
# Empty list [] means use all visits for that band
nights:
  20230519:
    r: []
    i: []
  20230521:
    r: []
    i: []
  20230523:
    r: []
    i: []

# Pipeline configuration files (paths relative to obs_nickel/configs/)
# If not specified, defaults are used with automatic fallback on failure
configs:
  science:
    # Primary config - tried first
    calibrate_image: calibrateImage/tuned_configs/2023ixf_relaxed.py
    # Fallback configs - tried in order if primary fails (e.g., WCS/PSF issues)
    calibrate_image_fallbacks:
      - calibrateImage/tuned_configs/2023ixf_relaxed_psfex_sparse.py
    colorterms: apply_colorterms.py
  dia:
    subtract_images: dia/subtractImages.py
    detect_and_measure: dia/detectAndMeasure.py

# Processing options
options:
  jobs: 8                 # Parallel jobs for pipetask
  skip_calibs: false      # Skip calibration step
  skip_science: false     # Skip science processing step
  skip_dia: false         # Skip difference imaging step
  forced_phot: true       # Run forced photometry at RA/Dec
  lightcurve: true        # Extract final lightcurve
  continue_on_error: true # Continue if one night fails
  use_fallbacks: true     # Try fallback configs on astrometry/PSF failures
