# Full pipeline configuration for SN 2023ixf using Nickel coadd templates
#
# Usage:
#   nickel run scripts/config/2023ixf/pipeline_nickel_template.yaml
#   nickel run scripts/config/2023ixf/pipeline_nickel_template.yaml --dry-run
#
# This orchestrates the full DIA pipeline:
#   0. Bootstrap repository (automatic if needed)
#   1. Build coadd templates from late-time Nickel observations (SN faded)
#   2. Run calibrations per night
#   3. Run science processing per night
#   4. Run DIA per night per band
#   5. Run forced photometry at SN coordinates
#   6. Extract combined lightcurve
#
# Note: Nickel templates are built from late 2023/2024 observations when the SN had faded.
# This provides better PSF matching than PS1 templates.
#
# SN 2023ixf is a Type II-P supernova in M101 (NGC 5457), one of the
# closest and brightest SNe in recent years.

# =============================================================================
# Environment Configuration (self-contained)
# =============================================================================
env:
  REPO: "/Users/dangause/Developer/lick/lsst/data/nickel/2023ixf_nickel_template_021826_repo"
  STACK_DIR: "/Users/dangause/Developer/lick/lsst/lsst_stack"
  OBS_NICKEL: "/Users/dangause/Developer/lick/lsst/lsst_stack/stack/nickel_processing_suite/packages/obs_nickel"
  RAW_PARENT_DIR: "/Users/dangause/Developer/lick/data"
  REFCAT_REPO: "/Users/dangause/Developer/lick/lsst/lsst_stack/stack/refcats"
  CP_PIPE_DIR: "${STACK_DIR}/cp_pipe"
  LICK_ARCHIVE_DIR: "/Users/dangause/Developer/lick/lick_searchable_archive"
  LICK_ARCHIVE_URL: "https://archive.ucolick.org/archive"
  LICK_ARCHIVE_INSTR: "NICKEL_DIR"

# Target information
# SN 2023ixf in M101 (Pinwheel Galaxy)
# Coordinates from TNS/Transient Name Server
object: "2023ixf"
ra: 210.910833
dec: 54.316389

# Bands to process
bands: ["b", "v", "r", "i"]

# Template configuration - use Nickel coadds from late SN epochs
template:
  type: coadd
  # Late-time nights for template building. SN 2023ixf plateau ended ~day 82 (Aug 9).
  # WARNING: Mid-plateau nights (20230728/20230801) still have significant SN flux (V~12-13).
  # Templates will contain SN flux - lightcurve shows RELATIVE brightness, not absolute.
  #   - 20230728 (day 70): V~12-13, mid-plateau (included for coverage)
  #   - 20230801 (day 74): V~12-13, mid-plateau (included for coverage)
  #   - 20230817 (day 90): V~14-15, just past plateau (ISR bug - may fail)
  #   - 20230905 (day 109): V~16-17, radioactive tail
  #   - 20230910 (day 114): V~16-17, radioactive tail
  nights:
    - 20230728
    - 20230801
    - 20230817
    - 20230905
    - 20230910

# Science nights - SN observations from discovery through plateau
# Includes early bright epochs (20230519-20230625) plus plateau nights (20230629-20230801)
# These span days 0-74, covering rise and plateau phases
science:
  nights:
    - 20230519
    - 20230521
    - 20230523
    - 20230527
    - 20230531
    - 20230602
    - 20230608
    - 20230611
    - 20230616
    - 20230618
    - 20230625
    - 20230629
    - 20230703
    - 20230706
    - 20230709
    - 20230714

# Pipeline configuration files (paths relative to obs_nickel/configs/)
configs:
  science:
    calibrate_image: calibrateImage/tuned_configs/dense_strict.py
    calibrate_image_fallbacks:
      - calibrateImage/tuned_configs/dense_relaxed.py
      - calibrateImage/tuned_configs/sparse_strict.py
      - calibrateImage/tuned_configs/sparse_relaxed.py
    colorterms: apply_colorterms.py
  coadd:
    make_direct_warp: coadds/makeDirectWarp_relaxed.py
  dia:
    subtract_images: dia/subtractImages.py
    detect_and_measure: dia/detectAndMeasure.py

# Processing options
options:
  jobs: 6
  skip_calibs: true    # Calibs already built for all nights
  skip_science: true  # Need to process newly added science nights (20230629-20230801)
  rebuild_templates: false  # Rebuild with only 3 late-time nights
  skip_dia: true
  forced_phot: false
  forced_phot_image_type: diffim
  continue_on_error: true
  use_fallbacks: true

# Lightcurve configuration
lightcurve:
  enabled: true
  dataset_type: forced_phot_diffim_radec
  min_snr: 0
  y_axis: apparent_mag
  x_axis: days_since_explosion
  explosion_mjd: 60082.75       # 2023-05-19 (~discovery date)
