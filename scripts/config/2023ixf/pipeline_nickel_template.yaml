# Full pipeline configuration for SN 2023ixf using Nickel coadd templates
#
# Usage:
#   nickel run scripts/config/2023ixf/pipeline_nickel_template.yaml
#   nickel run scripts/config/2023ixf/pipeline_nickel_template.yaml --dry-run
#
# This orchestrates the full DIA pipeline:
#   0. Bootstrap repository (automatic if needed)
#   1. Build coadd templates from late-time Nickel observations (SN faded)
#   2. Run calibrations per night
#   3. Run science processing per night
#   4. Run DIA per night per band
#   5. Run forced photometry at SN coordinates
#   6. Extract combined lightcurve
#
# Note: Nickel templates are built from late 2023/2024 observations when the SN had faded.
# This provides better PSF matching than PS1 templates.
#
# SN 2023ixf is a Type II-P supernova in M101 (NGC 5457), one of the
# closest and brightest SNe in recent years.

# =============================================================================
# Environment Configuration (self-contained)
# =============================================================================
env:
  REPO: "/Users/dangause/Developer/lick/lsst/data/nickel/2023ixf_nickel_template_022226b_repo"
  STACK_DIR: "/Users/dangause/Developer/lick/lsst/lsst_stack"
  OBS_NICKEL: "/Users/dangause/Developer/lick/lsst/lsst_stack/stack/nickel_processing_suite/packages/obs_nickel"
  RAW_PARENT_DIR: "/Users/dangause/Developer/lick/data"
  REFCAT_REPO: "/Users/dangause/Developer/lick/lsst/lsst_stack/stack/refcats"
  CP_PIPE_DIR: "${STACK_DIR}/cp_pipe"
  LICK_ARCHIVE_DIR: "/Users/dangause/Developer/lick/lick_searchable_archive"
  LICK_ARCHIVE_URL: "https://archive.ucolick.org/archive"
  LICK_ARCHIVE_INSTR: "NICKEL_DIR"

# Target information
# SN 2023ixf in M101 (Pinwheel Galaxy)
# Coordinates from TNS/Transient Name Server
# RA = 14:03:38.580, Dec = +54:18:42.10
object: "2023ixf"
ra: 210.910750
dec: 54.311694

# Bands to process
bands: ["b", "v", "r", "i"]

# Template configuration - use Nickel coadds from late 2023 epochs
# NOTE: Ideal templates would use late 2024 data (SN fully faded), but that data
# is still proprietary. Using late 2023 instead - SN is fainter but not gone.
# Moved 3 latest science nights to template to ensure sufficient coverage.
template:
  type: coadd
  # Late 2023 nights for template building. SN 2023ixf plateau ended ~day 82.
  # These are post-plateau but SN still has some flux - templates will have SN contamination.
  # When 2024 data becomes available, switch to 20240808/20240812/20240816 for cleaner templates.
  nights:
    - 20230728   # Day 70: late plateau, V~14-15 (SN still bright, but needed for coverage)
    - 20230801   # Day 74: late plateau
    - 20230817   # Day 90: end of plateau / start of decline
    - 20230905   # Day 109: V~16-17, radioactive tail
    - 20230910   # Day 114: V~16-17, radioactive tail
    - 20231211   # Day 206: V~18+, late nebular phase (WARNING: all bad coords, excluded automatically)
  # FUTURE: Use these when 2024 data becomes public (SN fully faded, V>20)
  # nights:
  #   - 20240808   # Day 447: SN fully faded
  #   - 20240812   # Day 451: SN fully faded
  #   - 20240816   # Day 455: SN fully faded

# Science nights - SN observations from discovery through 2024
# 16 public science nights (2023) + 8 proprietary nights (2024, commented out)
# Template nights excluded from science to avoid self-subtraction
# Moved 20230728, 20230801, 20230817 to template to ensure coadd coverage
science:
  nights:
    # Early bright epochs (days 0-37, May-June 2023)
    - 20230519   # Discovery epoch (day 0)
    - 20230521
    - 20230523
    - 20230527
    - 20230531
    - 20230602
    - 20230608
    - 20230611
    - 20230616
    - 20230618
    - 20230625
    # Plateau phase (days 41-56, late June - July 2023)
    - 20230629
    - 20230703
    - 20230706
    - 20230709
    - 20230714
    # 2024 observations - PROPRIETARY, not yet in archive
    # Uncomment when data becomes public or available locally
    # - 20240416   # Day 333
    # - 20240429   # Day 346
    # - 20240516   # Day 363
    # - 20240521   # Day 368
    # - 20240526   # Day 373
    # - 20240616   # Day 394
    # - 20240715   # Day 423
    # - 20240719   # Day 427

# Pipeline configuration files (paths relative to obs_nickel/configs/)
configs:
  science:
    calibrate_image: calibrateImage/tuned_configs/dense_strict.py
    calibrate_image_fallbacks:
      - calibrateImage/tuned_configs/dense_relaxed.py
      - calibrateImage/tuned_configs/sparse_strict.py
      - calibrateImage/tuned_configs/sparse_relaxed.py
    colorterms: apply_colorterms.py
  coadd:
    make_direct_warp: coadds/makeDirectWarp_relaxed.py
  dia:
    subtract_images: dia/subtractImages.py
    detect_and_measure: dia/detectAndMeasure.py

# Processing options
options:
  jobs: 6
  concurrent_nights: 2       # Process up to 2 nights in parallel (coadd templates use more memory)
  skip_calibs: false
  skip_science: false
  rebuild_templates: true
  skip_dia: false
  forced_phot: true
  forced_phot_image_type: diffim
  continue_on_error: true
  use_fallbacks: true

# Lightcurve configuration
lightcurve:
  enabled: true
  dataset_type: forced_phot_diffim_radec
  min_snr: 1
  max_mag_err: 1.0
  y_axis: apparent_mag
  x_axis: days_since_explosion
  explosion_mjd: 60082.75       # 2023-05-19 (~discovery date)
