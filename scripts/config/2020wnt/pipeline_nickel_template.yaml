# Full pipeline configuration for SN 2020wnt using Nickel coadd templates
#
# Usage:
#   nickel run scripts/config/2020wnt/pipeline_nickel_template.yaml
#   nickel run scripts/config/2020wnt/pipeline_nickel_template.yaml --dry-run
#
# This orchestrates the full DIA pipeline:
#   1. Build coadd templates from late-time Nickel observations (SN faded)
#   2. Run calibrations per night
#   3. Run science processing per night
#   4. Run DIA per night per band
#   5. Run forced photometry at SN coordinates
#   6. Extract combined lightcurve
#
# Note: Nickel templates are built from late 2022 observations when the SN had faded.
# This provides better PSF matching than PS1 templates.

# =============================================================================
# Environment Configuration (self-contained)
# =============================================================================
env:
  REPO: "/Users/dangause/Developer/lick/lsst/data/nickel/2020wnt_nickel_template_repo"
  STACK_DIR: "/Users/dangause/Developer/lick/lsst/lsst_stack"
  OBS_NICKEL: "/Users/dangause/Developer/lick/lsst/lsst_stack/stack/nickel_processing_suite/packages/obs_nickel"
  RAW_PARENT_DIR: "/Users/dangause/Developer/lick/data"
  REFCAT_REPO: "/Users/dangause/Developer/lick/lsst/lsst_stack/stack/refcats"
  CP_PIPE_DIR: "${STACK_DIR}/cp_pipe"
  LICK_ARCHIVE_DIR: "/Users/dangause/Developer/lick/lick_searchable_archive"
  LICK_ARCHIVE_URL: "https://archive.ucolick.org/archive"
  LICK_ARCHIVE_INSTR: "NICKEL_DIR"

# Target information
# SN 2020wnt in NGC 5792
# Coordinates from TNS/Transient Name Server
object: "2020wnt"
ra: 56.66
dec: 43.23

# Bands to process
bands: ["b", "v", "r", "i"]

# Template configuration - use Nickel coadds from faded SN epochs
template:
  type: coadd
  # Late-time nights when SN had faded, used to build template coadds
  nights:
    - "20220105"
    - "20220108"
    - "20220110"
    - "20220118"
    - "20220124"
    - "20220126"
    - "20220208"
    - "20220212"

