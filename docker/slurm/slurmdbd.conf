# Slurm Database Daemon configuration for STIPS Docker test cluster

AuthType=auth/munge
DbdHost=slurmdbd
DbdPort=6819

SlurmUser=root

StorageType=accounting_storage/mysql
StorageHost=mysql
StoragePort=3306
StorageUser=slurm
StoragePass=password
StorageLoc=slurm_acct_db

LogFile=/var/log/slurm/slurmdbd.log
DebugLevel=info
