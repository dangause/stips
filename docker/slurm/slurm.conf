# Slurm 22.05 configuration for NPS Docker test cluster
#
# 1 controller (slurmctld), 2 compute nodes (c1, c2), accounting via slurmdbd.
# Conservative resources for containerized testing.

ClusterName=nps-test
SlurmctldHost=slurmctld

# Ports
SlurmctldPort=6817
SlurmdPort=6818

# Authentication
AuthType=auth/munge

# Scheduling
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_Core

# Accounting (via slurmdbd)
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=slurmdbd
AccountingStoragePort=6819

# Logging
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log
SlurmctldDebug=info
SlurmdDebug=info

# PID files
SlurmctldPidFile=/var/run/slurmctld.pid
SlurmdPidFile=/var/run/slurmd.pid

# State
StateSaveLocation=/var/spool/slurm
SlurmdSpoolDir=/var/spool/slurmd

# Timers
SlurmdTimeout=300
InactiveLimit=0
MinJobAge=300
SlurmctldTimeout=300
Waittime=0

# Process tracking (linuxproc works in containers without cgroup v2)
ProctrackType=proctrack/linuxproc
TaskPlugin=task/none

# Compute nodes (explicit CPUs — auto-detect unreliable in Docker containers)
NodeName=c[1-2] CPUs=4 RealMemory=4096 State=UNKNOWN
PartitionName=normal Nodes=c[1-2] Default=YES MaxTime=5-00:00:00 State=UP
