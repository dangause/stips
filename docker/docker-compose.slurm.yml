# NPS Slurm Test Cluster
#
# All Slurm services built from the same LSST base image (AlmaLinux 9,
# Slurm 22.05). Compute nodes have the full LSST stack so they can run
# pipetask directly (no Singularity needed in Docker test cluster).
#
# Usage:
#   # Build images
#   docker build -t nps-slurm:latest -f docker/Dockerfile.slurm .
#   docker build -t nps:latest -f docker/Dockerfile .
#
#   # Start the cluster
#   docker compose -f docker/docker-compose.slurm.yml up -d
#
#   # Check cluster status
#   docker exec nps-hpc sinfo
#
#   # Stop the cluster
#   docker compose -f docker/docker-compose.slurm.yml down
#
#   # With real data (override defaults with host bind mounts):
#   REPO=/path/to/repo RAW_PARENT_DIR=/path/to/raw REFCAT_REPO=/path/to/refcats \
#     docker compose -f docker/docker-compose.slurm.yml up -d

services:
  # ==========================================================================
  # MySQL Database (for Slurm accounting)
  # ==========================================================================
  mysql:
    image: mysql:8.0
    container_name: mysql
    hostname: mysql
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
      MYSQL_DATABASE: slurm_acct_db
      MYSQL_USER: slurm
      MYSQL_PASSWORD: password
    command: ["--default-authentication-plugin=mysql_native_password"]
    volumes:
      - mysql-data:/var/lib/mysql

  # ==========================================================================
  # Slurm Database Daemon
  # ==========================================================================
  slurmdbd:
    image: nps-slurm:latest
    container_name: slurmdbd
    hostname: slurmdbd
    command: ["slurmdbd"]
    volumes:
      - munge-etc:/shared-munge
      - slurm-log:/var/log/slurm
    expose:
      - "6819"
    depends_on:
      - mysql

  # ==========================================================================
  # Slurm Controller
  # ==========================================================================
  slurmctld:
    image: nps-slurm:latest
    container_name: slurmctld
    hostname: slurmctld
    command: ["slurmctld"]
    volumes:
      - munge-etc:/shared-munge
      - slurm-log:/var/log/slurm
      - shared-home:/home
      - ${REPO:-nps-repo}:/data/repo
      - ${RAW_PARENT_DIR:-nps-raw}:/data/raw
      - ${REFCAT_REPO:-nps-refcats}:/data/refcats:ro
    expose:
      - "6817"
    depends_on:
      - slurmdbd

  # ==========================================================================
  # Compute Nodes
  # ==========================================================================
  # Compute nodes use systemd as PID 1 (required for Slurm 22 cgroup/v2 scopes).
  # slurmd-init.sh copies the munge key and waits for slurmctld, then execs /sbin/init.
  c1:
    image: nps-slurm:latest
    container_name: c1
    hostname: c1
    entrypoint: ["/usr/local/bin/slurmd-init.sh"]
    privileged: true
    volumes:
      - munge-etc:/shared-munge
      - slurm-log:/var/log/slurm
      - shared-home:/home
      - ${REPO:-nps-repo}:/data/repo
      - ${RAW_PARENT_DIR:-nps-raw}:/data/raw
      - ${REFCAT_REPO:-nps-refcats}:/data/refcats:ro
    tmpfs:
      - /run
      - /tmp
    expose:
      - "6818"
    depends_on:
      - slurmctld

  c2:
    image: nps-slurm:latest
    container_name: c2
    hostname: c2
    entrypoint: ["/usr/local/bin/slurmd-init.sh"]
    privileged: true
    volumes:
      - munge-etc:/shared-munge
      - slurm-log:/var/log/slurm
      - shared-home:/home
      - ${REPO:-nps-repo}:/data/repo
      - ${RAW_PARENT_DIR:-nps-raw}:/data/raw
      - ${REFCAT_REPO:-nps-refcats}:/data/refcats:ro
    tmpfs:
      - /run
      - /tmp
    expose:
      - "6818"
    depends_on:
      - slurmctld

  # ==========================================================================
  # NPS Container (for submitting BPS jobs)
  # ==========================================================================
  nps:
    image: nps:latest
    container_name: nps-hpc
    hostname: nps
    volumes:
      - shared-home:/home
      - ${REPO:-nps-repo}:/data/repo
      - ${RAW_PARENT_DIR:-nps-raw}:/data/raw
      - ${REFCAT_REPO:-nps-refcats}:/data/refcats:ro
      - munge-etc:/shared-munge
    ports:
      - "${NPS_DASHBOARD_PORT:-8080}:8080"
    environment:
      - REPO=/data/repo
      - RAW_PARENT_DIR=/data/raw
      - REFCAT_REPO=/data/refcats
      - KMP_AFFINITY=disabled
    depends_on:
      - slurmctld
    stdin_open: true
    tty: true
    command: ["bash"]

volumes:
  munge-etc:
  slurm-log:
  shared-home:
  mysql-data:
  nps-repo:
  nps-raw:
  nps-refcats:

networks:
  default:
    name: slurm-cluster
