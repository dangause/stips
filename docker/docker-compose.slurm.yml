# Mini Slurm Cluster for Local HPC Testing
#
# This creates a small Slurm cluster for testing BPS workflows locally.
# Based on giovtorres/slurm-docker-cluster
#
# Usage:
#   # Start the cluster
#   docker-compose -f docker/docker-compose.slurm.yml up -d
#
#   # Submit a job from the controller
#   docker exec -it slurmctld bash
#   > sbatch /data/test_job.sh
#
#   # Check job status
#   docker exec slurmctld squeue
#
#   # Stop the cluster
#   docker-compose -f docker/docker-compose.slurm.yml down

version: "3.8"

services:
  # ==========================================================================
  # Slurm Database
  # ==========================================================================
  slurmdbd:
    image: giovtorres/slurm-docker-cluster:latest
    container_name: slurmdbd
    command: ["slurmdbd"]
    hostname: slurmdbd
    volumes:
      - slurm-etc:/etc/slurm
      - slurm-log:/var/log/slurm
    expose:
      - "6819"
    depends_on:
      - mysql

  # ==========================================================================
  # MySQL Database (for Slurm accounting)
  # ==========================================================================
  mysql:
    image: mysql:8.0
    container_name: mysql
    hostname: mysql
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
      MYSQL_DATABASE: slurm_acct_db
      MYSQL_USER: slurm
      MYSQL_PASSWORD: password
    volumes:
      - mysql-data:/var/lib/mysql

  # ==========================================================================
  # Slurm Controller
  # ==========================================================================
  slurmctld:
    image: giovtorres/slurm-docker-cluster:latest
    container_name: slurmctld
    command: ["slurmctld"]
    hostname: slurmctld
    volumes:
      - slurm-etc:/etc/slurm
      - slurm-log:/var/log/slurm
      - shared-home:/home
      # Mount NPS data directories
      - ${REPO:-/tmp/repo}:/data/repo
      - ${RAW_PARENT_DIR:-/tmp/raw}:/data/raw
      - ${REFCAT_REPO:-/tmp/refcats}:/data/refcats:ro
    expose:
      - "6817"
    depends_on:
      - slurmdbd

  # ==========================================================================
  # Compute Nodes (2 workers)
  # ==========================================================================
  c1:
    image: giovtorres/slurm-docker-cluster:latest
    container_name: c1
    command: ["slurmd"]
    hostname: c1
    volumes:
      - slurm-etc:/etc/slurm
      - slurm-log:/var/log/slurm
      - shared-home:/home
      - ${REPO:-/tmp/repo}:/data/repo
      - ${RAW_PARENT_DIR:-/tmp/raw}:/data/raw
      - ${REFCAT_REPO:-/tmp/refcats}:/data/refcats:ro
    expose:
      - "6818"
    depends_on:
      - slurmctld

  c2:
    image: giovtorres/slurm-docker-cluster:latest
    container_name: c2
    command: ["slurmd"]
    hostname: c2
    volumes:
      - slurm-etc:/etc/slurm
      - slurm-log:/var/log/slurm
      - shared-home:/home
      - ${REPO:-/tmp/repo}:/data/repo
      - ${RAW_PARENT_DIR:-/tmp/raw}:/data/raw
      - ${REFCAT_REPO:-/tmp/refcats}:/data/refcats:ro
    expose:
      - "6818"
    depends_on:
      - slurmctld

  # ==========================================================================
  # NPS Container (for submitting jobs)
  # ==========================================================================
  nps:
    image: nps:latest
    container_name: nps-hpc
    hostname: nps
    volumes:
      - shared-home:/home
      - ${REPO:-/tmp/repo}:/data/repo
      - ${RAW_PARENT_DIR:-/tmp/raw}:/data/raw
      - ${REFCAT_REPO:-/tmp/refcats}:/data/refcats:ro
      - slurm-etc:/etc/slurm:ro
    environment:
      - REPO=/data/repo
      - RAW_PARENT_DIR=/data/raw
      - REFCAT_REPO=/data/refcats
    depends_on:
      - slurmctld
    stdin_open: true
    tty: true
    command: ["bash"]

volumes:
  slurm-etc:
  slurm-log:
  shared-home:
  mysql-data:

networks:
  default:
    name: slurm-cluster
